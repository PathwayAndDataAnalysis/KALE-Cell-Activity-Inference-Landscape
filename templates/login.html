{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="app-card mx-auto mt-10 max-w-md p-8">
    <h1 class="mb-6 text-center text-2xl font-semibold text-gray-900">Login</h1>
    <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">
        <div class="mb-4">
            <label for="username" class="form-label">Username:</label>
            <input type="text" id="username" name="username" required
                class="form-control">
        </div>
        <div class="mb-6">
            <label for="password" class="form-label">Password:</label>
            <input type="password" id="password" name="password" required
                class="form-control">
        </div>
        <div class="flex items-center justify-between">
            <input type="submit" value="Login"
                class="btn-primary cursor-pointer">
            <a href="{{ url_for('auth.signup') }}"
                class="inline-block align-baseline text-sm font-semibold text-blue-700 hover:text-blue-900 hover:underline">
                Don't have an account? Sign Up
            </a>
        </div>
    </form>
</div>
{% endblock %}
