{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="mx-auto flex w-full max-w-3xl flex-1 items-start pt-8 sm:pt-12">
    <div class="app-card grid w-full overflow-hidden md:grid-cols-5">
        <div class="border-b border-gray-200 bg-gray-50 p-6 md:col-span-2 md:border-b-0 md:border-r">
            <p class="text-xs font-semibold uppercase tracking-wide text-gray-500">KALE workspace</p>
            <h1 class="mt-3 text-2xl font-semibold text-gray-900">Create Your Account</h1>
            <p class="mt-3 text-sm leading-6 text-gray-600">
                Set up access for your files, analyses, and activity visualizations.
            </p>
        </div>

        <div class="p-6 sm:p-8 md:col-span-3">
            <form method="POST" action="{{ url_for('auth.signup') }}" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">
                <div>
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" required class="form-control">
                </div>
                <div>
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" required class="form-control">
                </div>
                <div>
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required class="form-control">
                </div>
                <div class="flex flex-col gap-3 border-t border-gray-200 pt-5 sm:flex-row sm:items-center sm:justify-between">
                    <input type="submit" value="Sign Up" class="btn-primary cursor-pointer">
                    <a href="{{ url_for('auth.login') }}"
                        class="inline-flex items-center justify-center rounded-md px-3 py-2 text-sm font-semibold text-gray-700 transition hover:bg-gray-100 hover:text-gray-900">
                        Login
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
